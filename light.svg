</text>


<text x="55" y="210" class="ascii">

   █████▒   ▄▄▄▄▄▄▄▄   ▒█████

</text>


<text x="55" y="230" class="ascii">

   ████▓  ▄██████████▄  ▓████

</text>


<text x="55" y="250" class="ascii">

   ████  ▓██▀      ▀██▓  ████

</text>


