</text>


<text x="55" y="410" class="ascii">

      ▀██████▄▄▄▄▄▄██████▀

</text>


<text x="55" y="430" class="ascii">

        ▀██████████████▀

</text>


<text x="55" y="450" class="ascii">

          ▀▓████████▓▀

</text>


<text x="55" y="470" class="ascii">

             ░▒▓▒░

</text>


</g>


<!-- MOVING SCAN LINE -->

<rect

  x="34"

  y="40"

  width="430"

  height="4"

  fill="url(#accent)"

  opacity=".45">

  <animate

    attributeName="y"

    values="
    40;
    568;
    40"

    dur="5.5s"

    repeatCount="indefinite"/>

</rect>


<!-- TERMINAL -->

<rect

  x="490"

  y="54"

  width="638"

  height="502"

  rx="20"

  fill="#FFFFFF"

  fill-opacity=".72"

  stroke="#0F172A"

  stroke-opacity=".10"/>


<!-- TERMINAL BUTTONS -->

<circle
  cx="522"
  cy="82"
  r="6"
  fill="#FF5F57"/>

<circle
  cx="544"
  cy="82"
  r="6"
  fill="#FEBB2E"/>

<circle
  cx="566"
  cy="82"
  r="6"
  fill="#28C840"/>


<text

  x="594"

  y="88"

  class="information"

  font-size="13">

profile.sh

</text>


<!-- GREETING -->

<text

  x="530"

  y="150"

  class="hello">

Hi 👋, I'm

</text>


<!-- NAME -->

<text

  x="530"

  y="199"

  class="name">

Aյɑվ վɑժɑѵ

</text>


<!-- CLEAN ANIMATED JOB TITLES -->


<!-- SOFTWARE DEVELOPER -->

<text

  x="548"

  y="250"

  class="role"

  opacity="0">

Software Developer

<animate

  attributeName="opacity"

  values="
  1;
  1;
  0;
  0"

  keyTimes="
  0;
  .30;
  .33;
  1"

  dur="12s"

  repeatCount="indefinite"/>

</text>


<!-- AI AND AUTOMATION -->

<text

  x="548"

  y="250"

  class="role"

  opacity="0">

AI &amp; Automation Explorer

<animate

  attributeName="opacity"

  values="
  0;
  0;
  1;
  1;
  0;
  0"

  keyTimes="
  0;
  .32;
  .35;
  .63;
  .66;
  1"

  dur="12s"

  repeatCount="indefinite"/>

</text>


<!-- CYBERSECURITY -->

<text

  x="548"

  y="250"

  class="role"

  opacity="0">

Cybersecurity Enthusiast

<animate

  attributeName="opacity"

  values="
  0;
  0;
  1;
  1;
  0"

  keyTimes="
  0;
  .65;
  .68;
  .96;
  1"

  dur="12s"

  repeatCount="indefinite"/>

</text>


<!-- BLINKING CURSOR -->

<rect

  x="548"

  y="261"

  width="11"

  height="25"

  rx="2"

  fill="#06B6D4">

  <animate

    attributeName="opacity"

    values="
    1;
    0;
    1"

    dur=".85s"

    repeatCount="indefinite"/>

</rect>


<!-- INFORMATION -->

<text

  x="548"

  y="320"

  class="information">

⌖  India

</text>


<text

  x="548"

  y="358"

  class="information">

⌘  github.com/its-ajayyadav

</text>


<text

  x="548"

  y="396"

  class="information">

◎  Exploring AI, automation &amp; cybersecurity

</text>


<!-- SKILLS TITLE -->

<text

  x="548"

  y="435"

  class="hello"

  font-size="14">

SKILLS

</text>


<!-- PYTHON -->

<g>

<rect

  x="548"

  y="450"

  width="112"

  height="40"

  rx="20"

  fill="url(#pillGradient)"

  fill-opacity=".10"

  stroke="url(#accent)"

  stroke-opacity=".70"/>


<text

  x="604"

  y="476"

  text-anchor="middle"

  class="skill">

Python

</text>

</g>


<!-- JAVASCRIPT -->

<g>

<rect

  x="672"

  y="450"

  width="138"

  height="40"

  rx="20"

  fill="url(#pillGradient)"

  fill-opacity=".10"

  stroke="url(#accent)"

  stroke-opacity=".70"/>


<text

  x="741"

  y="476"

  text-anchor="middle"

  class="skill">

JavaScript

</text>

</g>


<!-- FOOTER LINE -->

<line

  x1="530"

  y1="510"

  x2="1088"

  y2="510"

  stroke="#0F172A"

  stroke-opacity=".09"/>


<!-- FOOTER -->

<text

  x="548"

  y="540"

  class="information"

  font-size="14">

github • @its-ajayyadav

</text>


<!-- ONLINE INDICATOR -->

<circle

  cx="1080"

  cy="535"

  r="5"

  fill="#10B981">

  <animate

    attributeName="r"

    values="
    4;
    7;
    4"

    dur="2s"

    repeatCount="indefinite"/>

  <animate

    attributeName="opacity"

    values="
    .5;
    1;
    .5"

    dur="2s"

    repeatCount="indefinite"/>

</circle>


<!-- GLASS REFLECTION -->

<rect

  x="-250"

  y="18"

  width="170"

  height="574"

  fill="url(#accent)"

  opacity=".04"

  transform="skewX(-18)">

  <animate

    attributeName="x"

    values="
    -250;
    1350"

    dur="8s"

    repeatCount="indefinite"/>

</rect>


<!-- ANIMATED OUTER BORDER -->

<rect

  x="18"

  y="18"

  width="1144"

  height="574"

  rx="24"

  fill="none"

  stroke="url(#accent)"

  stroke-opacity=".28"

  stroke-width="1.5">

  <animate

    attributeName="stroke-opacity"

    values="
    .12;
    .40;
    .12"

    dur="4s"

    repeatCount="indefinite"/>

</rect>


</g>

</svg>
