<svg xmlns="http://www.w3.org/2000/svg"
     width="1180"
     height="610"
     viewBox="0 0 1180 610"
     role="img"
     aria-label="GitHub profile banner">

<defs>

  <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">

    <stop offset="0%" stop-color="#2563EB">
      <animate
        attributeName="stop-color"
        values="#2563EB;#06B6D4;#10B981;#2563EB"
        dur="8s"
        repeatCount="indefinite"/>
    </stop>

    <stop offset="50%" stop-color="#06B6D4">
      <animate
        attributeName="stop-color"
        values="#06B6D4;#10B981;#2563EB;#06B6D4"
        dur="8s"
        repeatCount="indefinite"/>
    </stop>

    <stop offset="100%" stop-color="#10B981">
      <animate
        attributeName="stop-color"
        values="#10B981;#2563EB;#06B6D4;#10B981"
        dur="8s"
        repeatCount="indefinite"/>
    </stop>

  </linearGradient>

  <linearGradient id="pillGradient">

    <stop
      offset="0%"
      stop-color="#2563EB"/>

    <stop
      offset="100%"
      stop-color="#06B6D4"/>

  </linearGradient>

  <radialGradient id="blueGlow">

    <stop
      offset="0%"
      stop-color="#2563EB"
      stop-opacity=".15"/>

    <stop
      offset="100%"
      stop-color="#2563EB"
      stop-opacity="0"/>

  </radialGradient>

  <radialGradient id="cyanGlow">

    <stop
      offset="0%"
      stop-color="#06B6D4"
      stop-opacity=".12"/>

    <stop
      offset="100%"
      stop-color="#06B6D4"
      stop-opacity="0"/>

  </radialGradient>

  <clipPath id="mainCard">

    <rect
      width="1180"
      height="610"
      rx="28"/>

  </clipPath>

  <style>

    .ascii {
      font-family:
      ui-monospace,
      SFMono-Regular,
      Menlo,
      Consolas,
      monospace;

      font-size:15px;
      font-weight:700;

      fill:url(#accent);
    }

    .name {

      font-family:
      Inter,
      Segoe UI,
      Arial,
      sans-serif;

      font-size:43px;

      font-weight:750;

      fill:#0F172A;
    }

    .hello {

      font-family:
      Inter,
      Segoe UI,
      Arial,
      sans-serif;

      font-size:20px;

      font-weight:600;

      fill:#475569;
    }

    .role {

      font-family:
      ui-monospace,
      SFMono-Regular,
      Menlo,
      Consolas,
      monospace;

      font-size:22px;

      font-weight:650;

      fill:url(#accent);
    }

    .information {

      font-family:
      ui-monospace,
      SFMono-Regular,
      Menlo,
      Consolas,
      monospace;

      font-size:16px;

      fill:#475569;
    }

    .skill {

      font-family:
      Inter,
      Segoe UI,
      Arial,
      sans-serif;

      font-size:15px;

      font-weight:650;

      fill:#0F172A;
    }

  </style>

</defs>


<g clip-path="url(#mainCard)">


<!-- MAIN BACKGROUND -->

<rect
  width="1180"
  height="610"
  fill="#FFFFFF"/>


<!-- ANIMATED BACKGROUND GLOWS -->

<circle
  cx="150"
  cy="90"
  r="260"
  fill="url(#blueGlow)">

  <animateTransform

    attributeName="transform"

    type="translate"

    values="
    0 0;
    45 25;
    0 0"

    dur="11s"

    repeatCount="indefinite"/>

</circle>


<circle

  cx="1020"

  cy="510"

  r="300"

  fill="url(#cyanGlow)">

  <animateTransform

    attributeName="transform"

    type="translate"

    values="
    0 0;
    -50 -35;
    0 0"

    dur="13s"

    repeatCount="indefinite"/>

</circle>


<!-- MAIN GLASS CARD -->

<rect

  x="18"

  y="18"

  width="1144"

  height="574"

  rx="24"

  fill="#F8FAFC"

  fill-opacity=".84"

  stroke="#0F172A"

  stroke-opacity=".09"/>


<!-- ASCII PANEL -->

<rect

  x="34"

  y="34"

  width="430"

  height="542"

  rx="20"

  fill="#FFFFFF"

  fill-opacity=".70"

  stroke="url(#accent)"

  stroke-opacity=".30"/>


<!-- ASCII PORTRAIT -->

<g>

<animateTransform

  attributeName="transform"

  type="translate"

  values="
  0 0;
  0 -7;
  0 0"

  dur="5s"

  repeatCount="indefinite"/>


