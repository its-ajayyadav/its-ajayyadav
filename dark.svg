<svg xmlns="http://www.w3.org/2000/svg"
width="1180"
height="610"
viewBox="0 0 1180 610"
role="img"
aria-label="GitHub profile banner for Aյɑվ վɑժɑѵ">

<defs>

<linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">

<stop offset="0%" stop-color="#7C3AED">
<animate
attributeName="stop-color"
values="#7C3AED;#22D3EE;#10B981;#7C3AED"
dur="8s"
repeatCount="indefinite"/>
</stop>

<stop offset="50%" stop-color="#22D3EE">
<animate
attributeName="stop-color"
values="#22D3EE;#10B981;#7C3AED;#22D3EE"
dur="8s"
repeatCount="indefinite"/>
</stop>

<stop offset="100%" stop-color="#10B981">
<animate
attributeName="stop-color"
values="#10B981;#7C3AED;#22D3EE;#10B981"
dur="8s"
repeatCount="indefinite"/>
</stop>

</linearGradient>


<linearGradient id="portraitGradient"
x1="0%"
y1="0%"
x2="100%"
y2="100%">

<stop offset="0%" stop-color="#A855F7">

<animate
attributeName="stop-color"
values="#A855F7;#22D3EE;#10B981;#A855F7"
dur="7s"
repeatCount="indefinite"/>

</stop>

<stop offset="50%" stop-color="#22D3EE">

<animate
attributeName="stop-color"
values="#22D3EE;#10B981;#A855F7;#22D3EE"
dur="7s"
repeatCount="indefinite"/>

</stop>

<stop offset="100%" stop-color="#10B981">

<animate
attributeName="stop-color"
values="#10B981;#A855F7;#22D3EE;#10B981"
dur="7s"
repeatCount="indefinite"/>

</stop>

</linearGradient>


<linearGradient id="scanGradient"
x1="0%"
y1="0%"
x2="100%"
y2="0%">

<stop
offset="0%"
stop-color="#22D3EE"
stop-opacity="0"/>

<stop
offset="50%"
stop-color="#22D3EE"
stop-opacity=".55"/>

<stop
offset="100%"
stop-color="#22D3EE"
stop-opacity="0"/>

</linearGradient>


<linearGradient id="pillGradient">

<stop
offset="0%"
stop-color="#7C3AED"/>

<stop
offset="100%"
stop-color="#22D3EE"/>

</linearGradient>


<radialGradient id="purpleGlow">

<stop
offset="0%"
stop-color="#7C3AED"
stop-opacity=".30"/>

<stop
offset="100%"
stop-color="#7C3AED"
stop-opacity="0"/>

</radialGradient>


<radialGradient id="cyanGlow">

<stop
offset="0%"
stop-color="#22D3EE"
stop-opacity=".20"/>

<stop
offset="100%"
stop-color="#22D3EE"
stop-opacity="0"/>

</radialGradient>


<filter id="portraitGlow"
x="-30%"
y="-30%"
width="160%"
height="160%">

<feGaussianBlur
stdDeviation="2.2"
result="blur"/>

<feMerge>

<feMergeNode in="blur"/>

<feMergeNode in="SourceGraphic"/>

</feMerge>

</filter>


<clipPath id="mainCard">

<rect
width="1180"
height="610"
rx="28"/>

</clipPath>


<clipPath id="portraitPanel">

<rect
x="35"
y="35"
width="428"
height="540"
rx="19"/>

</clipPath>


<style>

.ascii {

font-family:
ui-monospace,
SFMono-Regular,
Menlo,
Monaco,
Consolas,
monospace;

font-size:11px;

font-weight:600;

letter-spacing:.5px;

fill:url(#portraitGradient);

white-space:pre;

}

.name {

font-family:
Inter,
Segoe UI,
Arial,
sans-serif;

font-size:43px;

font-weight:750;

fill:#F8FAFC;

}

.hello {

font-family:
Inter,
Segoe UI,
Arial,
sans-serif;

font-size:20px;

font-weight:600;

fill:#94A3B8;

}

.role {

font-family:
ui-monospace,
SFMono-Regular,
Menlo,
Consolas,
monospace;

font-size:22px;

font-weight:650;

fill:url(#accent);

}

.information {

font-family:
ui-monospace,
SFMono-Regular,
Menlo,
Consolas,
monospace;

font-size:16px;

fill:#94A3B8;

}

.skill {

font-family:
Inter,
Segoe UI,
Arial,
sans-serif;

font-size:15px;

font-weight:650;

fill:#F8FAFC;

}

</style>

